//=================================================================//
// app-ipms
//=================================================================//
ext {
    org_aspectj_version = '1.6.10'
    org_slf4j_version = '1.7.16'
    org_springframework_version = '3.1.1.RELEASE'
}

// configurations {
//     all {
//         exclude group: 'org.slf4j', module: 'slf4j-log4j12'
//         exclude group: 'org.slf4j', module: 'slf4j-api'
//     }
// }

apply plugin: 'war'
bootJar {
	enabled = true
}
jar {
	enabled = false
}
bootWar {
	archiveFileName = 'ipms_bootwar.war'
	enabled = true
}

war {
    manifest{
        attributes("Implementation-Title": project.name
        ,"Implementation-Version": version
        ,"Main-Class": "com.kt.ipms.IpmsApplication"
        )
    }
    archiveFileName = 'ipms.war'
    webInf{from '../warconfig/nmsLink.jsp'}
	enabled = false
} 

dependencies {
	implementation project(':common-base')
	implementation project(':common-web')
	implementation project(':common-mq')
	implementation project(':common-ws')

    // implementation files("libs/ADUtilSSL.jar")
	// implementation fileTree(dir: 'libs', include: ['**/*.jar'])
	
	implementation 'org.springframework.boot:spring-boot-starter'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'junit:junit:4.13.2'
	implementation 'org.springframework:spring-test'

	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-security'

	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf:2.7.3'	// 404 Error Page

	implementation 'javax.mail:mail:1.4.7'

	implementation 'org.springframework.boot:spring-boot-starter-amqp' /* RabbitMQConfiguration */

	// jsch: ssh연결을 위한 라이브러리
	implementation 'com.jcraft:jsch:0.1.55'

	// <<< h2-console                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
	runtimeOnly 'com.h2database:h2'
	implementation 'mysql:mysql-connector-java:8.0.23' 
	// >>> h2-console

	// <<< spring.database.url 설정 필요. compileOnly 로 하면 배포시 문제됨
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'	
	implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:2.2.2'    /* MyBatis */
    implementation 'org.bgee.log4jdbc-log4j2:log4jdbc-log4j2-jdbc4.1:1.16'  /* MyBatis 쿼리 로그 출력 */  
    // >>> spring.database.url 설정 필요

	// Gson: JSON 직렬화/역직렬화를 위한 Java 라이브러리: HttpUtil, JsonUtil
	implementation 'com.google.code.gson:gson'

	// JSON: 간단한 JSON 처리를 위한 라이브러리
	implementation 'org.json:json:20231013'

	// 
	// from Legacy IPMS
	// 

    // Legacy import 이후 빌드 에러 수정을 위한 추가
    implementation 'javax.xml.bind:jaxb-api:2.3.1'
    implementation 'org.glassfish.jaxb:jaxb-runtime:2.3.1'
    implementation 'org.glassfish.corba:glassfish-corba-omgapi:4.0.1'
    // implementation 'org.springframework.boot:spring-boot-starter-quartz'
    
    // Spring Core
    // implementation "org.springframework:spring-core:${org_springframework_version}"
    
    // Spring Beans (depends on spring-core)
    // implementation "org.springframework:spring-beans:${org_springframework_version}"
    
    // Spring AOP (depends on spring-core, spring-beans)
    // implementation "org.springframework:spring-aop:${org_springframework_version}"
    
    // Spring Context (depends on spring-core, spring-expression, spring-aop, spring-beans)
    // implementation("org.springframework:spring-context:${org_springframework_version}") {
    //     // Exclude Commons Logging in favor of SLF4j
    //     exclude group: 'commons-logging', module: 'commons-logging'
    // }
    
    // Spring Context (depends on spring-core, spring-expression, spring-aop, spring-beans)
    // implementation("org.springframework:spring-context") {
    //     // Exclude Commons Logging in favor of SLF4j
    //     exclude group: 'commons-logging', module: 'commons-logging'
    // }
    
    // Spring Context Support (includes utilities like EhCache, JavaMail, Quartz, Freemarker integration)
    // implementation "org.springframework:spring-context-support:${org_springframework_version}"
    implementation "org.springframework:spring-context-support:5.3.30"

    // AspectJ
    implementation "org.aspectj:aspectjrt:${org_aspectj_version}"
    implementation "org.aspectj:aspectjweaver:${org_aspectj_version}"
    
    // EPP XML Generator
    implementation "org.irms.epp:epp:1.0.0"
    
    // Xerces
    implementation "xerces:xercesImpl:2.11.0"
    
    // Logging
    // implementation "org.slf4j:slf4j-api:${org_slf4j_version}"
    // runtimeOnly "org.slf4j:jcl-over-slf4j:${org_slf4j_version}"
    // runtimeOnly "org.slf4j:slf4j-log4j12:${org_slf4j_version}"
    // implementation "log4j:log4j:1.2.16.2", {
    //     exclude group: 'javax.mail', module: 'mail'
    //     exclude group: 'javax.jms', module: 'jms'
    //     exclude group: 'com.sun.jdmk', module: 'jmxtools'
    //     exclude group: 'com.sun.jmx', module: 'jmxri'
    // }

    // KT Logger
    implementation "com.kt:log4kt:1.7"

    // KT Framework
    implementation "com.kt:kt-framework:1.1.18"	


    // LDAP
    implementation "nets.ldap:ADUtilSSL:1"
    
    // Injection
    implementation "javax.inject:javax.inject:1"
    
    // Servlet
    // compileOnly "javax.servlet:servlet-api:2.5"
    // compileOnly "javax.servlet.jsp:jsp-api:2.2"
    // implementation "javax.servlet:jstl:1.2"
    
    // Transaction
    implementation "javax.transaction:jta:1.1"
    
    // Testing
    testImplementation "junit:junit:4.7"
    
    // Commons Configuration
    implementation "commons-configuration:commons-configuration:1.8", {
        exclude group: 'commons-collections', module: 'commons-collections'
    }
    
    // Commons Exec
    implementation "org.apache.commons:commons-exec:1.1"
    
    // Commons Lang
    implementation "commons-lang:commons-lang:2.6"
    
    // Commons Fileupload
    implementation "commons-fileupload:commons-fileupload:1.2.2"
    
    // Commons IO
    implementation "commons-io:commons-io:2.3"
    
    // Cglib
    implementation "cglib:cglib-nodep:2.2"
    
    // Jackson
    implementation "org.codehaus.jackson:jackson-core-asl:1.9.6"
    implementation "org.codehaus.jackson:jackson-mapper-asl:1.9.6"
    implementation "org.codehaus.jackson:jackson-xc:1.9.6"
    
    // Database (PostgreSQL & MyBatis)
    // implementation "commons-dbcp:commons-dbcp:1.4"
    // implementation "org.mybatis:mybatis:3.2.7"
    // implementation "org.mybatis:mybatis-spring:1.2.2"
    // Uncomment and adjust for PostgreSQL JDBC if needed
    // implementation "org.postgresql:postgresql:9.3-1102-jdbc4"
    // implementation "com.edb:edb-jdbc16:1.0"
    
    // eGov Framework
    implementation "egovframework.rte:egovframework.rte.ptl.mvc:3.0.0"
    
    // Sitemesh
    implementation "org.sitemesh:sitemesh:3.0.0"
    
    // Spring Framework
    // implementation "org.springframework:spring-oxm"
    // implementation "org.springframework.ws:spring-ws-core:2.0.0.RELEASE"
    implementation "org.springframework.ws:spring-ws-core"
    
    // HTTP Client
    implementation "commons-httpclient:commons-httpclient:3.1"
    
    // Quartz Scheduler
    // implementation "org.quartz-scheduler:quartz:1.8.6"
    implementation 'org.quartz-scheduler:quartz:2.3.2'  // 온습도(TMPR) AP 에서 사용하는 버전. 코드 참고 가능
    
    // Apache POI
    implementation "org.apache.poi:poi:3.6"
    implementation "org.apache.poi:poi-contrib:3.6"
    implementation "org.apache.poi:poi-ooxml:3.6"
    implementation "org.apache.poi:poi-ooxml-schemas:3.6"
    
    // EPP RTK JAVA
    implementation "org.ipms.epp:epp-rtk:1.0.0"
    implementation "org.ipms.regex:regex:1.0.0"
    implementation "org.ipms.ant:ant:1.0.0"
    implementation "org.ipms.bcprov:bcprov:1.0.0"
    implementation "org.ipms:IDNSDK:1.0.0"
    // Uncomment and adjust for Xerces if needed
    // implementation "org.ipms.xerces:xerces-1.3.0:1.3.0"
    
    // JavaMail
    implementation "javax.mail:mail:1.4.7"
    
    // Crypto
    implementation "org.bouncycastle:bcpg-jdk16:1.46"
}

task bootJarRun(type: JavaExec) {
	group = '_custom'
	classpath = files(tasks.jar)
	args = ['--spring.profiles.active=dev', '--java.net.preferIPv4Stack=true']
	println("bootJarRun : " + tasks.jar )
}
