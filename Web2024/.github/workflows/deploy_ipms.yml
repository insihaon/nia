name: CI/CD Pipeline

# 수동으로 워크플로우를 트리거하기 위해 'workflow_dispatch' 이벤트를 사용합니다.
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.4.0'
          # node-version: '14'

      - name: Install npm 8.5.4
        run: npm install -g npm@8.5.4

      - name: Build FE
        run: |
          cd FE
          npm install --legacy-peer-deps
          npm run build:ipms

      - name: Set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'

      - name: Build BE
        run: |
          cd BE/app-ipms
          ./gradlew bootJar

      - name: Build Docker images
        run: docker-compose build

      - name: Deploy services
        run: docker-compose up -d
