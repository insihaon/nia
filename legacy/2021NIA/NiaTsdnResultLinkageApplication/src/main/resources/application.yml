  rabbitmq:
    address: 192.168.0.87  #개발
    port: 5675
    username: ENC(nM5TfLkdI8K26jnQlPUqUfRff1FyTWQG)
    password: ENC(y53jmhEna1ehHnCzMIn7gnMy7aDI0qiQ)

    niaPerformanceExchange: nia.exchangeNiaPerformanceDirectly
    niaPerformanceQueue: nia.NiaPerformanceIndexDirectly
    niaPerformanceRoutingKey: NiaPerformanceIndexDirectly

  task:
    poolSize: 100 
    keepAlive: 600000
    queueCapacity: 100
    concurrency: 100

    mybatis:
      mapper-locations: classpath*:sqlmap/gw/*.xml
      mybatisConfig-locations: classpath:mybatis-config.xml
