<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
  
</head>

<body>
  <div id="app">
    <Button @click="getData('json_01.json')">Type 1</Button>
    <Button @click="getData('json_02.json')">Type 2</Button>

    <div class="topologyArea">
      <c-item v-for="(item, index) in protectedLinkList" :key="index" class="cItem" :cdata="item">
      </c-item>
    </div>

    <div class="debugWin">
      <p>candidateNum : {{ candidateNum }}</p>
      <p>connectionOrderList : {{ connectionOrderList.length }}</p>
      <p>protectedLinkList : {{ protectedLinkList.length }}</p>
      <p>protectionLinkList : {{ protectionLinkList.length }}</p>
    </div>

  </div>
  <script src="./js/script.js"></script>
</body>

</html>
