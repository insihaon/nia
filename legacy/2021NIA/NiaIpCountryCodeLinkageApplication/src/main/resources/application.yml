---
spring:
  profiles: local

  jasypt:
    encryptor:
      bean: jasyptStringEncryptor
      property:
        prefix: ENC(
        suffix: )

  restTemplate:
    factory:
      readTimeout: 5000
      connectTimeout: 3000
    httpClient:
      maxConnTotal: 100
      maxConnPerRoute: 5

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://incodej-lab.iptime.org:6544/niadb
    username: niaadmin
    password: niaadmin12#$
    maximumPoolSize: 10
    idleTimeout: 6000

  mybatis:
    mapper-locations: classpath*:sqlmap/*.xml
    mybatisConfig-locations : classpath:mybatis-config.xml
    configuration:
      mapUnderscoreToCamelCase: true

