    uiToEngineExchange: nia.exchangeUiToEngineDirectly
    uiToEngineQueue: nia.UiToEngineIndexDirectly
    uiToEngineRoutingKey: UiToEngineIndexDirectly

    engineToUiExchange: nia.exchangeEngineToUiDirectly
    engineToUiQueue: nia.EngineToUiIndexDirectly
    engineToUiRoutingKey: EngineToUiIndexDirectly

    niaPerformanceEngineExchange: nia.exchangeNiaPerformanceEngineDirectly
    niaPerformanceEngineQueue: nia.NiaPerformanceEngineIndexDirectly
    niaPerformanceEngineRoutingKey: NiaPerformanceEngineIndexDirectly

    aiIpTrafficResultExchange: nia.exchangeAiIpTrafficResultDirectly
    aiIpTrafficResultQueue: nia.AiIpTrafficResultIndexDirectly
    aiIpTrafficResultRoutingKey: AiIpTrafficResultIndexDirectly

    engineTrafficExchange: nia.exchangeEngineTrafficDirectly
    engineTrafficQueue: nia.EngineTrafficIndexDirectly
    engineTrafficRoutingKey: EngineTrafficIndexDirectly

    #이상 유해 4차 큐 쏘는 곳 (codej -> zero1)

    engineToAiAnoExchange: nia.exchangeEngineToAiAnoDirectly
    engineToAiAnoQueue: nia.EngineToAiAnoIndexDirectly
