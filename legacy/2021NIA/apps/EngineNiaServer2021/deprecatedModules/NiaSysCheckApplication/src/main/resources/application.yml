  cluster:
    timeCondition: 5000

  task:
    poolSize: 100
    keepAlive: 600000
    queueCapacity: 100
    concurrency: 100

  datasource:
    driver-class-name: org.postgresql.Driver
    data-source-class-name: org.postgresql.ds.PGSimpleDataSource
    url: jdbc:postgresql://incodej-lab.iptime.org:6544/niadb
    username: niaadmin
    password: niaadmin12#$
#    url: jdbc:postgresql://116.89.191.47:6544/niadb
#    username: ENC(nM5TfLkdI8K26jnQlPUqUfRff1FyTWQG)
#    password: ENC(y53jmhEna1ehHnCzMIn7gnMy7aDI0qiQ)
    maximumPoolSize: 10
    idleTimeout: 6000

  mybatis:
    mapper-locations: classpath*:sqlmap/*.xml
    mybatisConfig-locations : classpath:mybatis-config.xml
    configuration:
      mapUnderscoreToCamelCase: true



  management:
    endpoints:
      web:
        exposure:
          include: health

