    aiAnoToEngineExchange: nia.exchangeAiToEngineAnoDirectly
    aiAnoToEngineQueue: nia.AiAnoToEngineIndexDirectly
    aiAnoToEngineRoutingKey: AiAnoToEngineIndexDirectly

    aiNoxToEngineExchange: nia.ExchangeEngineToAiNoxDirectly
    aiNoxToEngineQueue: nia.aiNoxToEngineIndexDirectly
    aiNoxToEngineRoutingKey: aiNoxToEngineIndexDirectly

