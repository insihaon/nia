server:
  port: 8093

logging:
  level:
    root: INFO

---
spring:
  profiles: real

  jasypt:
    encryptor:
      bean: jasyptStringEncryptor
      property:
        prefix: ENC(
        suffix: )

  rabbitmq:
    address: incodej-lab.iptime.org
    port: 6786
    username: niaadmin
    password: niaadmin12#$
#    username: ENC(nM5TfLkdI8K26jnQlPUqUfRff1FyTWQG)
#    password: ENC(y53jmhEna1ehHnCzMIn7gnMy7aDI0qiQ)

    engineExchange: nia.exchangeEngineDirectly
    engineQueue: nia.EngineIndexDirectly
    engineRoutingKey: nia.EngineIndexDirectly

    engineResultExchange: nia.exchangeEngineResultDirectly
    engineResultQueue: nia.EngineResultIndexDirectly
    engineResultRoutingKey: EngineResultIndexDirectly

    clusterStopExchange: nia.exchangeClusterStopDirectly
    clusterStopQueue: nia.ClusterStopIndexDirectly
    clusterStopRoutingKey: ClusterStopIndexDirectly

    engineClearExchange: nia.exchangeEngineClearDirectly
    engineClearQueue: nia.EngineClearIndexDirectly
