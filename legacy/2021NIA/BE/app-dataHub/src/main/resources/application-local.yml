server:
  servlet:
    context-path: /datahub/portal

spring:
  profiles.active: local

  h2:
    console:
      enabled: true
      settings.web-allow-others: true

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;BUILTIN_ALIAS_OVERRIDE=1
    username: sa
    password:

  redis:
    embedded-server-start: true
    host: 127.0.0.1
    port: 6379
    timeout: 3000

  rabbitmq:
    enabled: false  

myconf:
  auth:
    use: false 
