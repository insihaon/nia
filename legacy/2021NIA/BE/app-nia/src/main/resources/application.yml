server:
  servlet:
    context-path:
    session.timeout: 30m
  compression:
    enabled: true
    excluded-user-agents:
    mime-types: application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 2048
  tomcat.max-http-form-post-size: 5GB
  tomcat.max-swallow-size: 5GB

  error:
    include-exception: true
    include-stacktrace: always
    path: "/error"
    whitelabel:
      enabled: false

spring:
  application.name: nia-web
  config.use-legacy-processing: true # 스프링 부트 2.4 이전 레거시 구동방식 유지
  main.allow-bean-definition-overriding: true

  servlet.multipart:
    max-file-size: 5GB
    max-request-size: 5GB

  h2:
    console:
      enabled: true
      settings.web-allow-others: true

  datasource:
    driver-class-name: org.h2.Driver
    url: ENC(+M0P26bwsFgZs1CiVY5KjRSxvC2KavPym+NIU0beViAOGIoz5Cx06NfoYyoZn1qr0YozgrCLN/633lGhYIdVjZ/plSgftU51Tj3xD9LClqZ4shpfd5C7KR0oaguWKJLWX+Ta6OeQeiM=)
    username: sa
    password:
    hikari:
      connectionTimeout: 600000
      maximumPoolSize: 20
      maxLifetime: 600000
      minimumIdle: 10
      validationTimeout: 30000
      idleTimeout: 300000

  datasource2nd:
    enabled: false

  datasource3rd:
    enabled: false

  datasource4th:
    enabled: false

  datasource5th:
    enabled: false

  redis:
    embedded-server-start: false
    enabled: false
    host: 127.0.0.1
    port: 6379
    timeout: 3000
    maxheap: 128M

  session:
    jwt-compare: false
    store-type: none # none, redis

  jwt:
    secret: ENC(JHGQ4l2duXL/dcZJSWYxdyASjfzLjyXb)
  #sql.init.encoding: UTF-8 # DB 한글이 깨질 경우에만 설정

jasypt:
  encryptor:
    bean: jasyptStringEncryptor
    property:
      prefix: ENC(
      suffix: )

myconf:
  project: nia
  websocket:
    enabled: false
  auth:
    use: true #auth.use
    otp:
      use: false #otp.use
    single-only: false
    expired-seconds: 86400 # 60*60*24
    login: false

file:
  access-Url: /external/**
  upload-dir: ./external

# Log4j2 보안취약점 대응 (version 2.10 ~ 2.14.1)
log4j2.formatMsgNoLookups: true

# https://springdoc.org/#properties
springdoc:
  pathsToMatch: /**
  override-with-generic-response: false
  swagger-ui:
    doc-expansion: none
