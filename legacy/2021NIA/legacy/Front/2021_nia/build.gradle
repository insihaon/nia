mainClassName = 'com.nia.korenrca.server.Server'

shadowJar {
    classifier = ''
    version = '1.0'
    mergeServiceFiles {
        include 'META-INF/services/io.vertx.core.spi.VerticleFactory'
    }

    exclude '.idea'
    from('src/main/java/log4j2.xml')
    from('src/main/java') {
        include '**/*.xml'
    }
    from('lib/native') {
        into '/'
    }
    from('app/build') {
        into 'app/websrc'
    }
//    from('file-access/chrome') { // 빌드시 크롬 설치파일 포함
//        into 'file-access/chrome'
//    }

//    from('app/dist') {
