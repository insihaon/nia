<md-dialog class="profile-list-dialog" id="byAgencyStatisticsSkill" ng-cloak style="width: 60%; height:70%">
    <md-toolbar>
        <div class="md-toolbar-tools">
            <i class="fa fa-check fa-lg"></i>
            <span class="title" ng-click="debugger()">&nbsp;이용기관별 트래픽 분석 및 Top N</span>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="dlgFunc.cancel()">
                <md-icon md-svg-src="img/icons/ic_close_24px.svg" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <form>
        <md-dialog-content>
            <div layout="column" class="profile-list-dialog-content">
                <md-card class="profile-card" style="margin: 20px;">
                    <div layout="column" class="profile-list-search">
                        <div class="profile-list-search-info">
                            <span class="ml-2">이용기관(S)</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <md-select  ng-model="searchAgencyData.srcAgencyId" >
                                    <md-option ng-value="item.id" ng-repeat="item in SourceAgencyOptions">
                                        <span>{{item.name}}</span>
                                    </md-option>
                                </md-select>
                            </md-input-container>
                            <span class="ml-2">IP(S)</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <input class="profile-explanation" ng-model="searchAgencyData.srcAgencyIp" type="text" ng-enter="handleSearch()" clear-btn/>
                            </md-input-container>
                            <span class="ml-2">이용기관(D)</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <md-select  ng-model="searchAgencyData.dstAgencyId" >
                                    <md-option ng-value="item.id" ng-repeat="item in DestinationAgencyOptions">
                                        <span>{{item.name}}</span>
                                    </md-option>
                                </md-select>
                            </md-input-container>
                            <span class="ml-2">IP(D)</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <input class="profile-title" ng-model="searchAgencyData.dstAgencyIp" type="text" ng-enter="handleSearch()" clear-btn/>
                            </md-input-container>
                            <span class="ml-2">Top N</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <md-select  ng-model="searchAgencyData.topN" >
                                    <md-option ng-value="item.name" ng-repeat="item in topNOptions" selected="item.selected === true">
                                        <span>{{item.name}}</span>
                                    </md-option>
                                </md-select>
                            </md-input-container>
                        </div>
                        <div class="profile-list-search-btn">
                            <!-- <md-button class="profile-list-search-btn" ng-click="exportExcel()" style="font-size: 11px;"><i class="fas fa-file-excel fa-lg" style="color: #008000; margin-right: 2px; font-size: 20px;"></i>엑셀저장</md-button> -->
                            <!-- <md-button class="search-option-switch clearBtn" ng-click="" style="font-size: 11px;">
                                그래프
                            </md-button> -->
                            <md-button class="profile-list-search-btn" ng-click="handleSearch()" style="font-size: 11px;">
                                <i class="fa fa-search fa-lg"></i>
                            </md-button>
                            <md-button class="search-option-switch clearBtn" ng-click="searchClear()" style="margin-right: 50px;">
                                전체보기
                            </md-button>
                        </div>
                    </div>
                    <div layout="column" class="profile-table">
                        <table md-table>
                            <thead md-head>
                                <tr md-row>
                                    <th md-column md-column-size="80" class="pr-0"><span>Rank</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>이용기관(Source)</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>IP(Source)</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>이용기관(Destination)</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>IP(Destination)</span></th>
                                    <th md-column md-column-size="80" class="pr-0"><span>Mbyte</span></th>

                                </tr>
                            </thead>
                            <tbody md-body>
                                <tr md-row ng-repeat="item in selectByAgencyTrafficList" >
                                    <td md-cell md-column-size="80" class="pr-0">{{item.row_number}}</td>
                                    <td md-cell md-column-size="100" class="pr-0" >{{item.src_nren_name}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.src_ip}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.dst_nren_name}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.dst_ip}}</td>
                                    <td md-cell md-column-size="80" class="pr-0" >{{item.packet_bytes}}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </md-card>
            </div>
            <div class="modalFooter">
                <md-button class="md-raised dialog-btn base-btn-2 black-btn" ng-click="dlgFunc.cancel()">닫기</md-button>
            </div>
        </md-dialog-content>
    </form>
</md-dialog>
