<md-dialog class="port-list-dialog" ng-cloak>
    <md-toolbar>
        <div class="md-toolbar-tools">
            <i class="fa fa-check fa-lg"></i>
            <span class="title" ng-click="debugger()">포트 관리</span>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="dlgFunc.cancel()">
                <md-icon md-svg-src="img/icons/ic_close_24px.svg" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <form class="h-100">
        <md-dialog-content class="h-100">
            <div layout="column" class="port-list-dialog-content">
                <md-card class="port-card" style="margin: 20px;">
                    <div layout="column" class="port-detail-search">
                        <span class="node-name-title">노드명</span>
                        <md-input-container class="input-container">
                            <input class="node-name" ng-model="param.data.node_nm" type="text" disabled />
                        </md-input-container>
                        <span class="node-representative-title">대표IP</span>
                        <md-input-container class="input-container">
                            <input class="node-representative" ng-model="param.data.ip_addr" type="text" disabled />
                        </md-input-container>
                    </div>
                    <div layout="column" class="port-table">
                        <table md-table>
                            <thead md-head>
                                <tr md-row>
                                    <th md-column md-column-size="80" class="pr-0"><span>번호</span></th>
                                    <th md-column md-column-size="160" class="pr-0"><span>I/F_ID</span></th>
                                    <th md-column md-column-size="200" class="pr-0"><span>I/F명</span></th>
                                    <th md-column md-column-size="150" class="pr-0"><span>I/F타입</span></th>
                                    <th md-column md-column-size="150" class="pr-0"><span>IP주소</span></th>
                                    <!--<th md-column md-column-size="100" class="pr-0"><span>prefix</span></th>-->
                                    <th md-column md-column-size="70" class="pr-0"><span>대역폭<br>(Gbps)</span></th>
                                    <th md-column md-column-size="100" class="pr-0" style="z-index: 1;"><span>사용유무</span></th>
                                    <th md-column md-column-size="150" class="pr-0"><span>수정일</span></th>
                                    <!--<th md-column md-column-size="70" class="pr-0"><span>관리</span></th>-->
                                </tr>
                            </thead>
                            <tbody md-body>
                                <tr md-row ng-repeat="item in portList">
                                    <td md-cell md-column-size="80" class="pr-0">{{$index + 1}}</td>
                                    <td md-cell md-column-size="160" class="pr-0">
                                        <a style="color: #3d64ac; text-decoration: underline;" href="" ng-click="openPortAddDialog('update', item)">{{item.if_id}}</a>
                                    </td>
                                    <td md-cell md-column-size="200" class="pr-0">{{item.if_nm}}</td>
                                    <td md-cell md-column-size="150" class="pr-0">{{ifTypeData(item.if_type)}}</td>
                                    <td md-cell md-column-size="150" class="pr-0">{{item.ip_addr}}</td>
                                    <!--<td md-cell md-column-size="100" class="pr-0">{{item.ip_prefix}}</td>-->
                                    <td md-cell md-column-size="70" class="pr-0">{{item.if_speed}}</td>
                                    <td md-cell md-column-size="150" class="pr-0">
                                        {{ifUseType(item)}}
                                    </td>
                                    <td md-cell md-column-size="150" class="pr-0">{{item.chng_datetime}}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!--<md-table-pagination class="mt-2" md-limit="historyPagingTable.limit" md-limit-options="[30,50,100,200]" md-page="historyPagingTable.selected"-->
                                         <!--md-total="{{portList[0].PortTotalCount || 0}}" md-page-select="true" md-boundary-links="true">-->
                    <!--</md-table-pagination>-->
                </md-card>
            </div>
            <div class="modalFooter">
                <md-button class="md-raised base-btn-2 nia-dark-button md-hide" ng-style="{display: tools.store.optionsNodeEditable ? 'inline-block !important':'none'}" ng-click="openPortAddDialog('add')" ng-disabled="tools.store.optionsNodeEditable != true">등록</md-button>
                <md-button class="md-raised dialog-btn base-btn-2 black-btn" ng-click="dlgFunc.cancel()">닫기</md-button>
            </div>
        </md-dialog-content>
    </form>
</md-dialog>
