<md-dialog id="batchArea" class="batch-dialog">
    <form ng-cloak>
        <md-dialog-content>
            <md-toolbar>
                <div class="md-toolbar-tools">
                    <i class="fa fa-check fa-lg"></i>
                    <span class="title"> &nbsp; TT 일괄처리</span>
                    <span flex></span>
                    <md-button class="md-icon-button" ng-click="dlgFunc.cancel()">
                        <md-icon md-svg-src="img/icons/ic_close_24px.svg" aria-label="Close dialog"></md-icon>
                    </md-button>
                </div>
            </md-toolbar>

            <div layout="column" class="batchContents">
                <md-input-container md-no-float class="md-block search">
                    <md-icon md-svg-icon="images/svg/ic_search.svg"></md-icon>
                    <input ng-model="myQuery" type="text" placeholder="Search.." ng-model-options="{debounce:400}" clear-btn>
                </md-input-container>
                <md-card class="topas-card">
                    <md-content layout="column" class="topas-content">
                         <table md-table class="topas-table" md-row-select="options.rowSelection" multiple="{{options.multiSelect}}"
                                ng-model="selected" md-progress="promise">
                             <thead ng-if="!options.decapitate" md-head md-order="query.order"
                                    md-on-reorder="logOrder">
                                <tr md-row>
                                    <th md-column><md-checkbox class="small" ng-model="$parent.isAllSelected" ng-click="toggleAll(filteredTopasTT)"></md-checkbox></th>
                                    <th md-column md-order-by="ticketno"><span>TT No.</span></th>
                                    <th md-column><span>발생일시</span></th>
                                    <th md-column><span>마감일시</span></th>
                                    <th md-column><span>시스템명</span></th>
                                    <th md-column><span>발생국소</span></th>
                                    <th md-column><span>원인국소</span></th>
                                    <th id="ackFocus" md-column><span>고장원인</span></th>
                                    <th md-column><span>책임분류</span></th>
                                    <th md-column><span>수리내용</span></th>
                                </tr>
                             </thead>
                             <tbody id="topas-tbody" data-vs-repeat="24" md-body>
                                 <tr md-row md-select="item" md-on-select="logItem" id="row-{{item.ticketno}}"
                                     md-auto-select="options.autoSelect"
                                     ng-repeat="item in ($parent.filteredTopasTT = (topasTT | filter: {ticketno: myQuery} | orderBy: query.order ))">
                                     <td md-cell><md-checkbox class="small" ng-model="item.selected" ng-change="toggled(); checkSelected(item);"></md-checkbox></td>
                                     <td md-cell class="slim-cell">{{item.ticketno}}</td>
                                     <td md-cell class="slim-cell">{{item.alarmtime | dateFormat}}</td>
                                     <td md-cell class="slim-cell">{{(item.receivetime != '') ? (item.receivetime | dateFormat) : ''}}</td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.sysname}}</div></td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.site}}</div></td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.causesite}}</div></td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.brokencause}}</div></td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.responsibility}}</div></td>
                                     <td md-cell class="slim-cell"><div class="over-cell" show-over-text>{{item.fixed}}</div></td>
                                 </tr>
                             </tbody>
                         </table>
                    </md-content>
                    <md-table-pagination md-limit="query.limit" md-limit-options="limitOptions"
                                         md-page="query.page"
                                         md-total="{{topasTT.length}}" md-page-select="options.pageSelect"
                                         md-boundary-links="options.boundaryLinks"
                                         md-on-paginate="logPagination">
                    </md-table-pagination>
                </md-card>
            </div>
            <div layout="row" class="modalFooter">
                <span flex></span>
                <md-button class="md-raised base-btn-2 batch-btn" ng-click="ack(selected,$parent.filteredTopasTT)"
                           ng-disabled="selected.length <= 0">
                    <i class="fa fa-check fa-lg orange"></i>인지</md-button>
                <md-button class="md-raised base-btn-2 batch-btn" ng-click="fix(selected,$parent.filteredTopasTT)"
                           ng-disabled="selected.length <= 0">
                    <i class="fa fa-check fa-lg blue"></i>조치</md-button>
                <md-button class="md-raised base-btn-2 batch-btn" ng-click="fin(selected,$parent.filteredTopasTT)"
                           ng-disabled="selected.length <= 0">
                    <i class="fa fa-check fa-lg green"></i>마감</md-button>
            </div>
        </md-dialog-content>
    </form>
</md-dialog>
