<div class="dialog-area">
    <div class="dialogPopup" ng-hide="isChartProgressHide">
        <div class="rca-dialog-header">
            <span class="title">NIA KOREN</span>
        </div>
        <div class="dialogContent">
            <div layout="row" md-theme="grey" layout-sm="column" layout-align="space-around" style="z-index: 200; margin-top: 20px;">
                <md-progress-circular md-diameter="40"></md-progress-circular>
            </div>
            <div class="waitText">
                데이터를 조회중입니다<br> 잠시만 기다려 주십시오.<br>
                <span style="color: #b5b5b5; font-size: 12px;" ng-if="timeLabel">최대 {{timeLabel}}의 시간이 소요될 수 있습니다.</span>
            </div>
        </div>
        <div class="dialogFooter"></div>
    </div>
</div>
