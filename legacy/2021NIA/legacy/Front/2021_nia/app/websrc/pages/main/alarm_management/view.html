<md-dialog class="profile-list-dialog" id="alarmManagement" ng-cloak style="width: 60%; height:70%">
    <md-toolbar>
        <div class="md-toolbar-tools">
            <i class="fa fa-check fa-lg"></i>
            <span class="title" ng-click="debugger()">&nbsp;장애 현황 및 이력 관리 기능</span>
            <span flex></span>
            <md-button class="md-icon-button" ng-click="dlgFunc.cancel()">
                <md-icon md-svg-src="img/icons/ic_close_24px.svg" aria-label="Close dialog"></md-icon>
            </md-button>
        </div>
    </md-toolbar>
    <form>
        <md-dialog-content>
            <div layout="column" class="profile-list-dialog-content">
                <md-card class="profile-card" style="margin: 20px;">
                    <div layout="column" class="profile-list-search">
                        <div class="profile-list-search-info">
                            <span class="ml-2" style="margin-left: 10px">Ticket ID</span>
                            <md-input-container class="input-container mt-0 ml-2" style="margin: 0px 0px 0px 25px;">
                            <input type="text" ng-enter="handleSearch()" ng-model="searchAlarmData.ticketId">
                            </md-input-container>
                            <span class="ml-2">Ticket 유형</span>
                            <md-input-container class="input-container mt-0 ml-2">
                                <md-select  ng-model="searchAlarmData.ticketType" >
                                    <md-option ng-value="item.value" ng-repeat="item in ticketType">
                                        <span>{{item.ticket}}</span>
                                    </md-option>
                                </md-select>
                            </md-input-container>
                            <br>
                            <span class="ml-2" style="margin-left: 10px">발생시간</span>
                            <md-input-container class="input-container mt-0 ml-2" style="margin: 0px 0px 0px 25px;">
                                <input mdc-datetime-picker="" date="true" time="true" type="text"
                                show-todays-date="" minutes="true" min-date="date" show-icon="true"
                                edit-input="true" short-time="true" ng-init="null" ng-enter="handleSearch()"
                                ng-model="searchAlarmData.occurStartTime"/>
                            </md-input-container>
                            <span style="margin-left: 10px"> ~ </span>
                            <md-input-container class="input-container mt-0 ml-2" style="margin: 0px 0px 0px 25px;">
                                <input mdc-datetime-picker="" date="true" time="true" type="text"
                                show-todays-date="" minutes="true" min-date="date" show-icon="true"
                                edit-input="true" short-time="true" ng-init="null" ng-enter="handleSearch()"
                                ng-model="searchAlarmData.occurEndTime"/>
                            </md-input-container>
                            <span class="ml-2" style="margin-left: 10px">마감시간</span>
                            <md-input-container class="input-container mt-0 ml-2" style="margin: 0px 0px 0px 10px;">
                                <input  mdc-datetime-picker="" date="true" time="true" type="text"
                                show-todays-date="" minutes="true" min-date="date" show-icon="true"
                                edit-input="true" short-time="true" ng-init="null" ng-enter="handleSearch()"
                                ng-model="searchAlarmData.deadlineStartTime"/>
                            </md-input-container>
                            <span style="margin-left: 10px"> ~ </span>
                            <md-input-container class="input-container mt-0 ml-2" style="margin: 0px 0px 0px 10px;">
                                <input  mdc-datetime-picker="" date="true" time="true" type="text"
                                show-todays-date="" minutes="true" min-date="date" show-icon="true"
                                edit-input="true" short-time="true" ng-init="null" ng-enter="handleSearch()"
                                ng-model="searchAlarmData.deadlineEndTime"/>
                            </md-input-container>
                        </div>
                        <div class="profile-list-search-btn">
                            <!-- <md-button class="profile-list-search-btn" ng-click="exportExcel()" style="font-size: 11px;"><i class="fas fa-file-excel fa-lg" style="color: #008000; margin-right: 2px; font-size: 20px;"></i>엑셀저장</md-button> -->
                            <md-button class="profile-list-search-btn" ng-click="handleSearch()" style="font-size: 11px;">
                                <i class="fa fa-search fa-lg"></i>
                            </md-button>
                            <md-button class="search-option-switch clearBtn ml-2" ng-click="searchClear()" style="margin-right: 50px;">
                                전체보기
                            </md-button>
                        </div>
                    </div>
                    <div layout="column" class="profile-table" id="scrollable">
                        <table md-table>
                            <thead md-head>
                                <tr md-row>
                                    <th md-column md-column-size="100" class="pr-0"><span>티켓ID</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>병합티켓ID</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>발생 시간</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>마감 시간</span></th>
                                    <th md-column md-column-size="100" class="pr-0"><span>장애 구분</span></th>
                                    <th md-column md-column-size="120" class="pr-0"><span>장애 내용</span></th>
                                </tr>
                            </thead>
                            <tbody md-body>
                                <tr md-row ng-repeat="item in gridResult.list" >
                                    <td md-cell md-column-size="100" class="pr-0">{{item.ticket_id}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.parent_ticket_id}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.fault_time | dateFormat}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.handling_fin_time | dateFormat}}</td>
                                    <td md-cell md-column-size="100" class="pr-0">{{item.ticket_type}}</td>
                                    <td md-cell md-column-size="120" class="pr-0">{{item.ticket_rca_result_dtl_code}}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <md-table-pagination class="mt-2" md-limit="historyPagingTable.limit"
                                         md-limit-options="[30,50,100,200]" md-page="historyPagingTable.selected"
                                         md-total="{{gridResult.total || 0}}" md-page-select="true" md-boundary-links="true">
                    </md-table-pagination>
                </md-card>
            </div>
            <div class="modalFooter">
                <!-- <md-button class="md-raised base-btn-2 nia-dark-button"  ng-click="onClickRestore()">복원</md-button> -->
                <md-button class="md-raised dialog-btn base-btn-2 black-btn" ng-click="dlgFunc.cancel()">닫기</md-button>
            </div>
        </md-dialog-content>
    </form>
</md-dialog>
