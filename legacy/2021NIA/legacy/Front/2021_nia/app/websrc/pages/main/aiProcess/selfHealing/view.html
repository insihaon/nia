    <div id="secondMap" class="boxType2 working-order-area-ch second-map" ng-class="{'overlap':isWorkerListShow}">
        <div class="content">
            <div class="contentTitle" style="font-size: 18px; margin-top: -20px;">북부산 작업지시서</div>
            <img class="working-order-img" src="../../../../images/koren_rca/aiProcess/working_order2.jpg">
            <img class="working-order-map-img" src="../../../../images/koren_rca/aiProcess/working_order_map2.jpg">
        </div>
    </div>
    <div class="worker-area-ch boxType3">
        <div class="boxType2" style="position:absolute; top:50px; left:50px; width:880px; height:280px;">
            <div class="content">
                <div class="contentTitle" style="font-size: 18px;">작업 광케이블</div>
                <div class="content">
                    <img src="../../../../images/koren_rca/aiProcess/phase3_6_cable.png" style="left: 157px;top: 90px;position: absolute;">
                </div>
            </div>
        </div>
        <div class="boxType2" style="position:absolute; top:350px; left:50px; width:880px; height:285px;">
            <div class="content">
                <div class="contentTitle" style="font-size: 18px;margin-top: -53px;">작업 지시 현황</div>
                <div class="content">
                    <table class="tableType1" style="margin-top: 53px;width: 875px;border-top: 1px solid #347d90;">
                        <tr class="thead center">
                            <td><span>작업자</span></td>
                            <td><span>소속</span></td>
                            <td><span>전화번호</span></td>
                            <td><span>작업일정</span></td>
                            <td><span>실행</span></td>
                        </tr>
                        <tr ng-repeat="item in locateData" style="height: 100px;">
                            <td style="width: 150px;">
                                <div layout="row">
                                    <img src="{{item.url}}" style="width: 60px; margin: 0 10px;">
                                    <span style="margin: auto 0px;">{{item.name}}</span>
                                </div>
                            </td>
                            <td>{{item.org}}</td>
                            <td>{{item.telephone}}</td>
                            <td>{{item.time}}</td>
                            <td>{{item.action}}</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
