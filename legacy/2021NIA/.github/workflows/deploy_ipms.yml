name: CI/CD Pipeline

# 수동으로 워크플로우를 트리거하기 위해 'workflow_dispatch' 이벤트를 사용합니다.
on:
  push:
    branches:
      - main
	  
# main 브랜치에 코드가 푸시될 때마다 프론트엔드와 백엔드가 빌드되고 Docker Compose를 통해 배포
#on:
#  push:
#	branches:
#	  - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install npm 22.4.0
        run: npm install -g npm@22.4.0

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'

      - name: Build backend
        run: |
          cd backend
          ./gradlew bootJar

      - name: Build Docker images
        run: docker-compose build

      - name: Deploy services
        run: docker-compose up -d
