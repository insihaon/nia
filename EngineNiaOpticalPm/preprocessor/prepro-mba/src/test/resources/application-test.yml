spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    mbaAiModelResultQueue: test.mba.ai.model.result
    engineMbaTicketQueue: test.engine.mba.ticket

  h2:
    console:
      enabled: true

logging:
  level:
    org.springframework: INFO
    kr.go.ap: DEBUG
    org.hibernate.SQL: DEBUG
